penalties:
  # class1: very soft stylistic tells (common in human prose too)
  class1:
    - phrase: "the atmosphere"
      penalty: 0.00001
    - phrase: "palpable"
      penalty: 0.00001
    - phrase: "eyes glinted"
      penalty: 0.00001
    - phrase: "delve"
      penalty: 0.00001
    - phrase: "orchestra"
      penalty: 0.00001
    - phrase: "camaraderie"
      penalty: 0.00001
    - phrase: "iridescent"
      penalty: 0.00001
    - phrase: "dance of"
      penalty: 0.00001
  # class2: weak-to-medium "tell, don't show" shortcuts
  class2:
    - phrase: "re:(?<!\\w)for\\s+what\\s+(?:seemed|felt)\\s+like(?!\\w)"
      penalty: 0.00002
    - phrase: "re:(?<!\\w)to\\s+meet\\s+(?:her|his|their|your)\\s+gaze(?!\\w)"
      penalty: 0.00002
    - phrase: "re:(?<!\\w)(?:overwhelmed\\s+by\\s+the\\s+sheer|the\\s+world\\s+narrows)(?!\\w)"
      penalty: 0.00002
    - phrase: "re:(?<!\\w)(?:heat|warmth)\\s+(?:blooms|spreads|floods)(?!\\w)"
      penalty: 0.00002
    - phrase: "re:(?<!\\w)stomach\\s+(?:flips|drops|lurches)(?!\\w)"
      penalty: 0.00002
    - phrase: "re:(?<!\\w)heart\\s+(?:hammering|pounding|stutters|leaps|clenches|swells|skips\\s+a\\s+beat)(?!\\w)"
      penalty: 0.00002
  # class3: medium purple-prose clichés
  class3:
    - phrase: "half-lidded eyes"
      penalty: 0.00004
    - phrase: "re:(?<!\\w)maybe,\\s+just\\s+maybe(?!\\w)"
      penalty: 0.00004
    - phrase: "re:(?<!\\w)perhaps,\\s+just\\s+perhaps(?!\\w)"
      penalty: 0.00004
    - phrase: "rich tapestry"
      penalty: 0.00004
    - phrase: "a testament to"
      penalty: 0.00004
    - phrase: "threatens to consume"
      penalty: 0.00004
    - phrase: "dimly lit"
      penalty: 0.00004
    - phrase: "body and soul"
      penalty: 0.00004
    - phrase: "a symphony of"
      penalty: 0.00004
  # class4: strong canned-romance / RP slop markers
  class4:
    - phrase: "re:(?<!\\w)ministrations?(?!\\w)"
      penalty: 0.00007
    - phrase: "re:(?<!\\w)could(?:n['’]t|\\s+not)\\s+help\\s+but(?!\\w)"
      penalty: 0.00007
    - phrase: "re:(?<!\\w)primal\\s+(?:urge|need|desire|instinct)(?!\\w)"
      penalty: 0.00007
    - phrase: "re:(?<!\\w)breath\\s+(?:hitched|catches|caught|fanning)(?!\\w)"
      penalty: 0.00007
    - phrase: "re:(?<!\\w)sharp\\s+intake\\s+of\\s+breath(?!\\w)"
      penalty: 0.00007
    - phrase: "re:(?<!\\w)knees?\\s+(?:go\\s+weak|buckle|threaten\\s+to\\s+buckle)(?!\\w)"
      penalty: 0.00007
    - phrase: "re:(?<!\\w)ghost\\s+of\\s+a\\s+(?:touch|kiss|smile)(?!\\w)"
      penalty: 0.00007
  # class5: very strong AI-ish meta/disclaimer markers (rare but high confidence)
  class5:
    - phrase: "re:(?<!\\w)as\\s+an\\s+ai(?!\\w)"
      penalty: 0.0002
    - phrase: "re:(?<!\\w)important\\s+to\\s+(?:note|remember)\\s+that(?!\\w)"
      penalty: 0.0002
    - phrase: "re:(?<!\\w)however,\\s+it(?:\\s+is|['’]s)?\\s+important(?!\\w)"
      penalty: 0.0002